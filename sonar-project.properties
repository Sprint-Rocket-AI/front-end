# =============================================
# SonarQube - context-builder-app (front-end)
# =============================================

sonar.projectKey=sprint-rocket-ai
sonar.organization=sprint-rocket-ai
sonar.host.url=https://sonarcloud.io/organizations/sprint-rocket-ai/
sonar.projectName=front-end
sonar.projectVersion=0.0.0

# Sources
sonar.sources=src
sonar.coverage.exclusions=\
  src/main.tsx,\
  src/App.tsx,\
  src/App.css,\
  src/index.css,\
  src/assets/**,\
  src/routes/**,\
  src/pages/**,\
  src/components/**,\
  src/**/interfaces/**,\
  src/**/components/**,\
  src/**/pages/**,\
  src/api/interceptor.ts,\
  src/modules/auth/config/**,\
  src/modules/auth/pages/**,\
  src/commons/mocks/**,\
  src/commons/context/**,\
  src/store/store.ts
# Tests
sonar.tests=src
sonar.test.inclusions=src/**/__tests__/**/*.test.ts,src/**/__tests__/**/*.test.tsx

# Coverage — generated by: npm run test:coverage
sonar.javascript.lcov.reportPaths=coverage/lcov.info

# Language
sonar.language=ts
sonar.sourceEncoding=UTF-8
